<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Primary Meta Tags -->
    <title>Mewgenics Radio — Official Game Soundtrack Streaming 🐱🎵</title>
    <meta name="description" content="Listen to the official Mewgenics soundtrack — 82 tracks of cat-themed music, vocal and instrumental versions. Free online radio station.">
    <meta name="keywords" content="Mewgenics, soundtrack, OST, game music, cat music, Edmund McMillen, Tyler Glaiel, indie game, radio, playlist">
    <meta name="author" content="Mewgenics Radio">
    <meta name="robots" content="index, follow">

    <!-- Open Graph / Facebook / VK / Telegram -->
    <meta property="og:title" content="Mewgenics Radio — Official Game Soundtrack">
    <meta property="og:description" content="82 tracks of purr-fect music from Mewgenics game. Listen free!">
    <meta property="og:type" content="website">
    <meta property="og:image" content="radio2.jpg">
    <meta property="og:image:width" content="1280">
    <meta property="og:image:height" content="853">
    <meta property="og:image:alt" content="Mewgenics Radio Album Art - Cat Music Streaming">

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Mewgenics Radio">
    <meta name="twitter:description" content="Official Mewgenics game soundtrack streaming">
    <meta name="twitter:image" content="radio2.jpg">
    <meta name="twitter:image:alt" content="Mewgenics Radio Album Art">

    <!-- Schema.org / Google -->
    <meta itemprop="name" content="Mewgenics Radio">
    <meta itemprop="description" content="Official Mewgenics game soundtrack with 82 tracks">
    <meta itemprop="image" content="radio2.jpg">
    <link rel="image_src" href="radio2.jpg">

    <!-- Additional -->
    <meta name="theme-color" content="#667eea">
    <link rel="canonical" href="https://your-domain.com">

    <!-- Styles & Icons -->
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='50' fill='%23667eea'/%3E%3Ctext x='50' y='50' font-size='60' text-anchor='middle' dy='.3em' fill='white'%3E🐱%3C/text%3E%3C/svg%3E">
</head>
<body>
    <div class="container">
        <header>
            <h1>🎵 Mewgenics Radio 🐱</h1>
            <p class="tagline">Purr-fect Music Streaming</p>
        </header>

        <div class="player">
            <div class="album-art" style="background-image: url('radio2.jpg'); background-size: cover; background-position: center;">
            </div>

            <div class="player-info">
                <h2 id="track-title">Loading...</h2>
                <p id="track-artist">Mewgenics Radio</p>
            </div>

            <audio id="audio-player" crossorigin="anonymous">
                Your browser does not support the audio element.
            </audio>

            <div class="controls">
                <button id="prev-btn" class="btn" title="Previous">⏮️</button>
                <button id="play-btn" class="btn play-btn" title="Play">▶️</button>
                <button id="next-btn" class="btn" title="Next">⏭️</button>
                <button id="shuffle-btn" class="btn" title="Shuffle">🔀</button>
                <button id="loop-btn" class="btn" title="Loop">🔁</button>
            </div>

            <div class="progress-container">
                <span id="current-time">0:00</span>
                <div class="progress-bar">
                    <div id="progress" class="progress"></div>
                </div>
                <span id="duration">0:00</span>
            </div>

            <div class="volume-container">
                <span>🔊</span>
                <input type="range" id="volume-slider" min="0" max="100" value="70">
                <span id="volume-percent">70%</span>
            </div>

            <div class="playlist">
                <h3>📋 Now Playing</h3>
                <ul id="playlist-list"></ul>
            </div>
        </div>

        <!-- Share Section -->
        <!-- Share Section -->
        <div class="share-section">
            <p class="share-text">🐾 Share Mewgenics Radio with friends!</p>
            <div class="share-buttons">
                <button id="share-x" class="share-btn x-btn">
                    <svg class="share-icon" viewBox="0 0 24 24" width="18" height="18">
                        <path fill="currentColor" d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/>
                    </svg>
                    X (Twitter)
                </button>
                <button id="share-fb" class="share-btn fb-btn">
                    <svg class="share-icon" viewBox="0 0 24 24" width="18" height="18">
                        <path fill="currentColor" d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/>
                    </svg>
                    Facebook
                </button>
                <button id="share-copy" class="share-btn copy-btn">
                    <svg class="share-icon" viewBox="0 0 24 24" width="18" height="18">
                        <path fill="currentColor" d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/>
                    </svg>
                    Copy Link
                </button>
            </div>
        </div>

        <footer>
            <p>© 2026 Mewgenics Radio | Streaming Purr-formances 🎧</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
